display:
  # Zero-DISP-7A es nativamente 1024x600 horizontal.
  # width/height aqui son la resolucion LOGICA (vertical) en la que dibuja la app;
  # la app la rota internamente para mostrarla en el panel fisico.
  width: 600
  height: 1024
  rotate: 90   # 90 o 270 segun el sentido de montaje fisico del panel; 0 = sin rotar
  fullscreen: true
  fps: 30
  # Segundos de inactividad en la pantalla principal antes de poner el reloj
  # de reposo. 0 = nunca. Se puede cambiar desde Ajustes sin editar este archivo.
  screen_timeout_seconds: 60

voice:
  # "pi" = gTTS + parlante conectado a la Pi. "alexa" = usa un Echo via
  # Home Assistant (Alexa Media Player), no necesita parlante en la Pi.
  output: "pi"
  hourly_announcement: true
  interval_minutes: 60

home_assistant:
  base_url: "http://homeassistant.local:8123"
  token: "REEMPLAZA_CON_TU_TOKEN"

alexa:
  # Nombre exacto del servicio notify para tu Echo. Buscalo en HA:
  # Herramientas de desarrollo > Acciones, filtra por "alexa_media".
  notify_service: "notify.alexa_media_REEMPLAZA"

cameras:
  - name: "Camara 1"
    type: "mjpeg"
    url: "http://192.168.0.162/webcam/?action=stream"
  - name: "Camara 2"
    type: "mjpeg"
    url: "http://192.168.0.100/webcam/?action=stream"
  - name: "Camara ONVIF"
    type: "ha_snapshot"
    # entity_id de la camara en Home Assistant (no la IP). Buscalo en
    # Herramientas de desarrollo > Estados, filtra por "camera."
    entity_id: "camera.REEMPLAZA_CON_TU_ENTITY_ID"

weather:
  api_key: "REEMPLAZA_CON_TU_KEY"
  location: "Bogota,CO"

news:
  feeds:
    - name: "El Comercio"
      url: "https://www.elcomercio.com/feed/"
    - name: "Otro feed"
      url: "https://example.com/rss"

wifi:
  interface: "wlan0"

pc_control:
  # URL del agente de escritorio (ver desktop-agent/agent.py), corriendo en tu PC.
  base_url: "http://IP_DE_TU_PC:5566"
  token: "REEMPLAZA_CON_EL_MISMO_TOKEN_DEL_AGENTE"
  shortcuts:
    - name: "YouTube"
      type: "url"
      target: "https://youtube.com"
    - name: "Crunchyroll"
      type: "url"
      target: "https://www.crunchyroll.com/es/discover"
    - name: "ChatGPT"
      type: "url"
      target: "https://chatgpt.com/"
    - name: "Home Assistant"
      type: "url"
      target: "http://192.168.0.208:8123/home/overview"
    - name: "Ubicate Web"
      type: "url"
      target: "https://ubicate-web.vercel.app/"
    - name: "GitHub"
      type: "url"
      target: "https://github.com/CristianDv7?tab=repositories"
    - name: "Android Studio"
      type: "app"
      target: "android_studio"
